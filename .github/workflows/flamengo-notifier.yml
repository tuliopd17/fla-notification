name: Flamengo Notifier

on:
  schedule:
    # 09:00 BRT = 12:00 UTC. Roda todo dia de manhã (horário de Brasília).
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      force_send:
        description: "Enviar mensagem mesmo sem jogo (teste)"
        required: false
        default: "0"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run notifier
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          FORCE_SEND: ${{ github.event.inputs.force_send || '0' }}
        run: python flamengo_notifier.py
