name: Flamengo Daily Briefing

on:
  schedule:
    # 09:00 BRT = 12:00 UTC. Boletim diario sobre o Mengao.
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "1 = nao envia WhatsApp, so imprime"
        required: false
        default: "0"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run notifier
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
        run: python flamengo_notifier.py
