name: Flamengo Daily Briefing

on:
  schedule:
    # Alvo: chegar no zap ate as 08:00 BRT no PIOR caso.
    # GitHub Actions cron e' best-effort e pode atrasar bastante em horarios de pico.
    # Disparamos as 05:00 BRT (08:00 UTC) pra ter 3h de margem de atraso.
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "1 = nao envia WhatsApp, so imprime"
        required: false
        default: "0"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run notifier
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
        run: python flamengo_notifier.py
