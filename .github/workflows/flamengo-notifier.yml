name: Flamengo Daily Briefing

on:
  schedule:
    # Alvo: chegar no zap por volta das 08:00 BRT.
    # GitHub Actions cron e' best-effort e ATRASA em horarios de pico (as vezes 30+ min).
    # Por isso disparamos 07:30 BRT (10:30 UTC) — o atraso natural empurra pras 8h.
    - cron: "30 10 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "1 = nao envia WhatsApp, so imprime"
        required: false
        default: "0"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run notifier
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
        run: python flamengo_notifier.py
