name: Flamengo Pre-Match Reminder

on:
  schedule:
    # Dispara a cada 30min nas janelas de jogos (BRT → UTC+3):
    # Qua/Qui 19:00-22:00 BRT → 22:00-01:00 UTC
    - cron: "*/30 22-23 * * 3,4"
    - cron: "*/30 0 * * 4,5"
    # Sab 16:00-21:00 BRT → 19:00-00:00 UTC
    - cron: "*/30 19-23 * * 6"
    # Dom 11:00-20:00 BRT → 14:00-23:00 UTC
    - cron: "*/30 14-23 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "1 = nao envia WhatsApp, so imprime"
        required: false
        default: "0"

concurrency:
  group: fla-prematch
  cancel-in-progress: false

jobs:
  prematch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prematch check
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
        run: python flamengo_notifier.py --mode prematch
